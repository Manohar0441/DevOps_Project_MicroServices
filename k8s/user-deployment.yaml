apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: user

  template:
    metadata:
      labels:
        app: user

    spec:
      containers:
        - name: user
          image: manoharn0441/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002